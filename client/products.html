<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Products - Dopamine Box</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .products-header {
            text-align: center;
            padding: 40px 0 20px;
        }
        .products-header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: #222;
        }
        .products-header p {
            color: #777;
            margin-top: 10px;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
            padding: 20px 0 40px;
        }
        .filter-section {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,.05);
            margin-bottom: 30px;
        }
        .filter-section select,
        .filter-section input {
            padding: 12px 18px;
            border-radius: 30px;
            border: 1px solid #eee;
            outline: none;
            font-weight: 500;
            background: #fff;
            transition: .3s;
            min-width: 150px;
        }
        .filter-section select:hover,
        .filter-section input:hover {
            border-color: #ff6b6b;
        }
        .filter-section button {
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            background: #222;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: .3s;
        }
        .filter-section button:hover {
            background: #ff6b6b;
            transform: translateY(-2px);
        }
        .back-link {
            display: inline-block;
            margin: 20px 0;
            color: #ff6b6b;
            font-weight: 600;
            text-decoration: none;
            transition: .3s;
        }
        .back-link:hover {
            letter-spacing: 1px;
        }
        .no-products {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .no-products h2 {
            font-size: 1.5rem;
            color: #555;
        }
    </style>
</head>
<body>
    <div id="navbar"></div>
    
    <div class="container">
        <div class="products-header">
            <a href="/client/" class="back-link">← Back to Home</a>
            <h1>🎁 All Products</h1>
            <p>Discover our collection of beautiful gifts and products</p>
        </div>
        
        <div class="filter-section">
            <input type="text" id="searchInput" placeholder="🔍 Search products..." style="flex:1;min-width:200px;">
            <select id="categoryFilter">
                <option value="">All Categories</option>
            </select>
            <select id="moodFilter">
                <option value="">All Moods</option>
                <option value="Happy">😊 Happy</option>
                <option value="Loved">❤️ Loved</option>
                <option value="Peaceful">🕊️ Peaceful</option>
                <option value="Excited">🎉 Excited</option>
                <option value="Grateful">🙏 Grateful</option>
            </select>
            <select id="sortFilter">
                <option value="featured">Featured</option>
                <option value="price-asc">Price: Low to High</option>
                <option value="price-desc">Price: High to Low</option>
                <option value="name">Name A-Z</option>
            </select>
            <button id="clearFilters">Clear All</button>
        </div>
        
        <div id="productsContainer">
            <div style="text-align:center;padding:40px;color:#999;">Loading products...</div>
        </div>
    </div>
    
<!-- Cart Drawer -->
<div id="cartDrawer" class="cart-drawer">
    <div class="cart-header" style="display:flex;justify-content:space-between;align-items:center;padding:15px 20px;border-bottom:1px solid #eee;">
        <h3 style="margin:0;font-size:1.2rem;font-weight:700;">🛒 Your Cart</h3>
        <button onclick="closeCart()" style="background:none;border:none;font-size:22px;cursor:pointer;padding:5px;color:#666;transition:0.3s;">✖</button>
    </div>
    
    <div id="cartItems" style="flex:1;overflow-y:auto;padding:10px 0;"></div>
    
    <div class="cart-footer" style="padding:15px 20px;border-top:1px solid #eee;background:#fafafa;">
        <div style="display:flex;justify-content:space-between;margin-bottom:15px;font-size:18px;">
            <span style="font-weight:600;">Total:</span>
            <span id="cartTotal" style="font-weight:800;color:#ff6b6b;">$0.00</span>
        </div>
        <button class="checkout-btn" onclick="window.checkout()" 
                style="width:100%;padding:14px;background:linear-gradient(135deg,#ff6b6b,#ee5a24);color:#fff;border:none;border-radius:12px;font-weight:700;font-size:16px;cursor:pointer;transition:0.3s;">
            🛒 Checkout - $0.00
        </button>
        <button onclick="closeCart()" 
                style="width:100%;margin-top:10px;padding:12px;background:#f0f0f0;color:#555;border:none;border-radius:12px;font-weight:600;cursor:pointer;transition:0.3s;">
            Continue Shopping
        </button>
    </div>
</div>

<div id="cartOverlay" class="cart-overlay" onclick="closeCart()" style="
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.4);
    display:none;
    z-index:9998;
    backdrop-filter:blur(4px);
"></div>
    
    <div id="footer"></div>
    
    <script type="module">
        import Navbar from './components/navbar.js';
        import Footer from './components/footer.js';
        import ProductCard from './components/productCard.js';
        import { getProducts, getCategories } from './assets/js/api.js';
        import { addToCart } from './assets/js/storage.js';
        
        Navbar();
        Footer();
        
        let allProducts = [];
        let allCategories = [];
        
        const container = document.getElementById('productsContainer');
        const searchInput = document.getElementById('searchInput');
        const categoryFilter = document.getElementById('categoryFilter');
        const moodFilter = document.getElementById('moodFilter');
        const sortFilter = document.getElementById('sortFilter');
        const clearBtn = document.getElementById('clearFilters');
        
        async function loadProducts() {
            try {
                // Load categories
                allCategories = await getCategories();
                populateCategories();
                
                // Load products
                allProducts = await getProducts();
                
                // Check URL params
                const params = new URLSearchParams(window.location.search);
                const categoryParam = params.get('category');
                if (categoryParam) {
                    categoryFilter.value = categoryParam;
                }
                
                applyFilters();
                
            } catch (error) {
                console.error('Error loading products:', error);
                container.innerHTML = `
                    <div class="no-products">
                        <h2>⚠️ Error Loading Products</h2>
                        <p>Please make sure the API server is running.</p>
                        <p style="font-size:14px;color:#aaa;margin-top:10px;">
                            Try: <code>node server.js</code> or check your API URL
                        </p>
                    </div>
                `;
            }
        }
        
        function populateCategories() {
            const categories = allCategories.map(c => c.name || c);
            const unique = [...new Set(categories)];
            
            categoryFilter.innerHTML = `
                <option value="">All Categories</option>
                ${unique.map(c => `<option value="${c}">${c}</option>`).join('')}
            `;
        }
        
        function applyFilters() {
            const search = searchInput.value.toLowerCase();
            const category = categoryFilter.value;
            const mood = moodFilter.value;
            const sort = sortFilter.value;
            
            let filtered = [...allProducts];
            
            if (search) {
                filtered = filtered.filter(p => 
                    p.name.toLowerCase().includes(search) ||
                    p.category.toLowerCase().includes(search) ||
                    (p.description && p.description.toLowerCase().includes(search))
                );
            }
            
            if (category) {
                filtered = filtered.filter(p => p.category === category);
            }
            
            if (mood) {
                filtered = filtered.filter(p => p.mood === mood);
            }
            
            switch(sort) {
                case 'price-asc':
                    filtered.sort((a, b) => (a.price || 0) - (b.price || 0));
                    break;
                case 'price-desc':
                    filtered.sort((a, b) => (b.price || 0) - (a.price || 0));
                    break;
                case 'name':
                    filtered.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
                    break;
                default:
                    filtered.sort((a, b) => (b.isFeatured ? 1 : 0) - (a.isFeatured ? 1 : 0));
            }
            
            renderProducts(filtered);
        }
        
        function renderProducts(products) {
            if (!products || products.length === 0) {
                container.innerHTML = `
                    <div class="no-products">
                        <h2>😅 No products found</h2>
                        <p>Try adjusting your filters.</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = `
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;flex-wrap:wrap;gap:10px;">
                    <span style="color:#888;font-size:14px;">Showing ${products.length} products</span>
                </div>
                <div class="products-grid">
                    ${products.map(ProductCard).join('')}
                </div>
            `;
            
            // Attach Add to Cart events
            document.querySelectorAll('.btn-add-to-cart').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = this.dataset.id;
                    if (id) {
                        addToCart(id, 1);
                        import('./utils/storage.js').then(({ updateCartBadge }) => {
                            updateCartBadge();
                        });
                        this.textContent = '✅ Added!';
                        setTimeout(() => {
                            this.textContent = '🛒 Add to Cart';
                        }, 2000);
                    }
                });
            });
        }
        
        // Event listeners
        searchInput.addEventListener('input', applyFilters);
        categoryFilter.addEventListener('change', applyFilters);
        moodFilter.addEventListener('change', applyFilters);
        sortFilter.addEventListener('change', applyFilters);
        
        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            categoryFilter.value = '';
            moodFilter.value = '';
            sortFilter.value = 'featured';
            applyFilters();
        });
        function getImageUrl(image) {
    const API = 'http://localhost:5000';
    const PLACEHOLDER = 'https://via.placeholder.com/300x300?text=No+Image';
    
    if (!image) return PLACEHOLDER;
    if (image.startsWith('http')) return image;
    
    // ✅ نفس الطريقة اللي شغالة في product.html
    let cleanImage = image.startsWith('/') ? image : `/${image}`;
    return `${API}${cleanImage}`;
}
  // Wishlist toggle
document.querySelectorAll('.wishlist-btn').forEach(btn => {
    btn.addEventListener('click', function(e) {
        e.stopPropagation();
        this.classList.toggle('active');
        
        // تغيير النص أو الأيقونة
        if (this.classList.contains('active')) {
            this.innerHTML = '❤️';
            this.style.color = '#ff6b6b';
        } else {
            this.innerHTML = '♡';
            this.style.color = '#999';
        }
    });
});      
        // Load
        loadProducts();
    </script>
</body>
</html>
