<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Login - Dopamine Box</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #f8f9fa 0%, #fff5f7 100%);
        }
        .container {
            text-align: center;
            padding: 40px;
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            max-width: 400px;
            width: 100%;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ff6b6b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 15px;
        }
        h2 {
            color: #1a1a2e;
            margin: 0;
        }
        p {
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="icon">🔐</span>
        <h2>Social Login</h2>
        <p>Please wait while we log you in...</p>
        <div class="spinner"></div>
    </div>

    <script>
        // Get token and user from URL
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const userParam = params.get('user');
        const error = params.get('error');

        if (error) {
            alert('❌ Social login failed. Please try again.');
            window.location.href = 'login.html';
        } else if (token && userParam) {
            try {
                const user = JSON.parse(decodeURIComponent(userParam));
                
                // Save to localStorage
                localStorage.setItem('dopamine_token', token);
                localStorage.setItem('dopamine_user', JSON.stringify(user));

                // Redirect to home
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);

            } catch (e) {
                console.error('Error parsing user data:', e);
                window.location.href = 'login.html?error=invalid_data';
            }
        } else {
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
